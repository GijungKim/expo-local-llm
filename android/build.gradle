plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
  id 'org.jetbrains.kotlin.android'
}

group = 'expo.modules.localllm'
version = '0.1.0'

android {
  namespace "expo.modules.localllm"
  compileSdk 35

  defaultConfig {
    minSdk 26
    versionCode 1
    versionName "0.1.0"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = '17'
  }

  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'com.google.ai.edge.localagent:localagent:0.1.0'
}
